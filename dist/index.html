<!DOCTYPE html>
<html lang="ca" data-visual-mode="neon">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>BeatPulse</title>
  <script type="module" crossorigin src="/assets/index-B8xLMC4b.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BaYD71d6.css">
</head>
<body>
  <div id="app">

    <!-- Capçalera -->
    <header class="header">
      <div class="header-left">
        <h1 class="app-title">Beat<span class="title-accent">Pulse</span></h1>
      </div>
      <button id="settings-btn" class="settings-btn" aria-label="Obrir configuració">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Canvas p5.js -->
    <div id="canvas-container" aria-label="Visualitzador de pulsacions"></div>

    <!-- Secció BPM -->
    <section class="bpm-section">
      <div class="bpm-display">
        <button id="bpm-down" class="bpm-btn" aria-label="Reduir BPM">−</button>
        <div class="bpm-value">
          <span id="bpm-number">120</span>
          <span class="bpm-label">BPM</span>
        </div>
        <button id="bpm-up" class="bpm-btn" aria-label="Augmentar BPM">+</button>
      </div>
      <input
        type="range"
        id="bpm-slider"
        min="40"
        max="240"
        value="120"
        class="bpm-slider"
        aria-label="Slider de BPM"
      />
    </section>

    <!-- Selector de mode -->
    <section class="mode-section" aria-label="Mode de pulsació">
      <!-- Ull: només visualització -->
      <button class="mode-btn active" data-mode="visual" title="Només visualització">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
      <!-- Ones: vibració -->
      <button class="mode-btn" data-mode="vibration" title="Vibració">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M2 9v6"/><path d="M6 5v14"/><path d="M22 9v6"/><path d="M18 5v14"/>
          <rect x="9" y="7" width="6" height="10" rx="2"/>
        </svg>
      </button>
      <!-- Llanterna -->
      <button class="mode-btn" data-mode="torch" title="Llanterna">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 2h8l2 7H6L8 2z"/>
          <path d="M6 9l1.5 11h9L18 9"/>
          <line x1="12" y1="13" x2="12" y2="17"/>
        </svg>
      </button>
      <!-- Estrella: tot activat -->
      <button class="mode-btn" data-mode="all" title="Tot activat">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
        </svg>
      </button>
    </section>

    <!-- Botó principal -->
    <button id="start-stop-btn" class="start-stop-btn">START</button>

    <!-- Panell de configuració (bottom sheet) -->
    <div id="settings-panel" class="settings-panel hidden" role="dialog" aria-modal="true" aria-label="Configuració">
      <div class="settings-content">
        <div class="settings-handle"></div>
        <h2>Configuració</h2>

        <!-- BPM manual -->
        <div class="setting-group">
          <label for="settings-bpm">BPM manual</label>
          <input type="number" id="settings-bpm" min="40" max="240" value="120" />
        </div>

        <!-- Mode visual -->
        <div class="setting-group">
          <label for="visual-mode-select">Mode visual</label>
          <div class="select-wrapper">
            <select id="visual-mode-select">
              <option value="neon">✦ Neon</option>
              <option value="fire">🔥 Foc</option>
              <option value="minimal">◌ Minimal</option>
            </select>
            <span class="select-arrow">▾</span>
          </div>
        </div>

        <!-- Toggle Vibració -->
        <div class="setting-group toggle-row">
          <span class="toggle-label">Vibració</span>
          <label class="toggle" aria-label="Activar vibració">
            <input type="checkbox" id="vibration-toggle" />
            <span class="toggle-slider"></span>
          </label>
        </div>

        <!-- Toggle Llanterna -->
        <div class="setting-group toggle-row">
          <span class="toggle-label">Llanterna</span>
          <label class="toggle" aria-label="Activar llanterna">
            <input type="checkbox" id="torch-toggle" />
            <span class="toggle-slider"></span>
          </label>
        </div>

        <!-- Intensitat de partícules -->
        <div class="setting-group">
          <label for="particle-intensity">
            Intensitat de partícules:
            <span id="particle-value" class="setting-value">5</span>
          </label>
          <input type="range" id="particle-intensity" min="1" max="10" value="5" />
        </div>

        <button id="settings-close" class="settings-close-btn">Tancar ✕</button>
      </div>
    </div>

  </div>

</body>
</html>
