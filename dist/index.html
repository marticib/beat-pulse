<!DOCTYPE html>
<html lang="ca" data-visual-mode="neon">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>BeatPulse</title>
  <script type="module" crossorigin src="/assets/index-DRVqC0Uz.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-NxP0ZldH.css">
</head>
<body>
<div id="app">

  <!-- ===== PANTALLA 1: CERCA D'ARTISTA ===== -->
  <div id="screen-search" class="screen screen--active">
    <div class="screen-body screen-center">
      <h1 class="app-title">Beat<span class="title-accent">Pulse</span></h1>
      <p class="app-subtitle">Music Visualizer</p>

      <div class="search-block">
        <p class="block-label">Artist:</p>
        <input
          type="text"
          id="search-input"
          class="field-lg"
          placeholder="Escriu un artista..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button id="search-btn" class="btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Buscar
        </button>
        <p id="search-status" class="search-status" aria-live="polite"></p>
      </div>
    </div>
  </div>

  <!-- ===== PANTALLA 2: ARTISTA + CONFIGURACIÓ ===== -->
  <div id="screen-settings" class="screen">
    <div class="screen-topbar">
      <button id="back-to-search-btn" class="icon-btn" aria-label="Tornar a la cerca">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <span class="topbar-title">Beat<span class="title-accent">Pulse</span></span>
      <div class="topbar-spacer"></div>
    </div>

    <div class="screen-body scrollable">

      <!-- Targeta artista -->
      <div class="artist-row">
        <img id="artist-thumb" class="artist-thumb hidden" alt="" />
        <div class="artist-text">
          <h2 id="artist-name" class="artist-name"></h2>
          <div class="meta-pills">
            <span id="artist-genre" class="pill"></span>
            <span id="artist-country" class="pill"></span>
          </div>
        </div>
      </div>
      <p id="artist-bio" class="artist-bio"></p>

      <div class="divider"></div>

      <!-- Llista de cançons d'iTunes: tap a una cançó → sona + va al visualitzador -->
      <p class="cfg-label" style="margin-bottom:10px">Cançons</p>
      <div id="tracks-list" class="tracks-list"></div>

    </div>

    <div class="screen-footer">
      <button id="go-visualizer-btn" class="btn-primary btn-block">Iniciar</button>
    </div>
  </div>

  <!-- ===== PANTALLA 3: VISUALITZADOR ===== -->
  <div id="screen-visualizer" class="screen">
    <div class="viz-header">
      <button id="back-to-settings-btn" class="icon-btn" aria-label="Tornar a configuració">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="viz-bpm-chip">
        <span id="viz-bpm" class="viz-bpm-num">120</span>
        <span class="bpm-label">BPM</span>
        <span id="bpm-auto-badge" class="auto-badge hidden">AUTO</span>
      </div>
      <button id="viz-sidebar-btn" class="icon-btn" aria-label="Configuració">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="4" y1="6"  x2="20" y2="6"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
          <line x1="4" y1="18" x2="20" y2="18"/>
          <circle cx="9"  cy="6"  r="2.2" fill="currentColor" stroke="none"/>
          <circle cx="15" cy="12" r="2.2" fill="currentColor" stroke="none"/>
          <circle cx="9"  cy="18" r="2.2" fill="currentColor" stroke="none"/>
        </svg>
      </button>
    </div>

    <!-- Mini reproductor: apareix quan ve d'una cançó seleccionada -->
    <div id="mini-player" class="mini-player hidden">
      <img id="player-art" class="player-art" alt="" />
      <div class="player-info">
        <span id="player-track-name" class="player-track-name"></span>
        <div class="player-progress-track">
          <div id="player-progress-bar" class="player-progress-bar"></div>
        </div>
      </div>
    </div>

    <div id="canvas-container"></div>

    <!-- Backdrop fosc quan el sidebar és obert -->
    <div id="viz-backdrop" class="viz-backdrop"></div>

    <!-- Sidebar de configuració (llisca des de la dreta) -->
    <div id="viz-sidebar" class="viz-sidebar">

      <div class="sidebar-section">
        <p class="sidebar-label">Visualització</p>
        <div class="viz-row">
          <label class="viz-btn">
            <input type="radio" name="visual-mode" value="neon" checked />
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            <span>Neon</span>
          </label>
          <label class="viz-btn">
            <input type="radio" name="visual-mode" value="fire" />
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C12 2 7 8 7 13a5 5 0 0 0 10 0C17 8 12 2 12 2zm0 14.5a3 3 0 0 1-3-3c0-2 1.5-4 3-5.5 1.5 1.5 3 3.5 3 5.5a3 3 0 0 1-3 3z"/></svg>
            <span>Fire</span>
          </label>
          <label class="viz-btn">
            <input type="radio" name="visual-mode" value="minimal" />
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
            <span>Minimal</span>
          </label>
        </div>
      </div>

    </div>

    <!-- Vibració i Llanterna: a la pantalla 3 directament -->
    <div class="viz-device-row">
      <label class="viz-btn">
        <input type="checkbox" id="vibration-toggle" />
        <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="9" y="3" width="6" height="18" rx="2" fill="currentColor"/>
          <path d="M5 9c-1.2 2-1.2 5 0 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M19 9c1.2 2 1.2 5 0 7"  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>Vibració</span>
      </label>
      <label class="viz-btn">
        <input type="checkbox" id="torch-toggle" />
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M7 2h10l2 7H5L7 2z"/>
          <rect x="6" y="9" width="12" height="13" rx="2"/>
          <circle cx="12" cy="15" r="2.5" fill="currentColor" stroke="none"/>
        </svg>
        <span>Llanterna</span>
      </label>
    </div>

    <div class="viz-footer">
      <button id="start-stop-btn" class="start-stop-btn">START</button>
    </div>
  </div>

  <audio id="preview-audio" preload="none"></audio>

</div>
</body>
</html>
